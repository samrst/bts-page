<body>

<!-- ── MAIN ── -->
<main id="page-contato" class="page" style="background:var(--bg2)">
  <div class="container" style="padding-top:clamp(2rem,5vw,3rem); padding-bottom:clamp(2rem,5vw,3rem)">

    <!-- HEADER -->
    <div class="reveal">
      <p class="sec-label">Contato</p>
      <h2 class="sec-title">Envie sua Mensagem</h2>
      <div class="hairline"></div>
    </div>

    <!-- FORM SECTION -->
    <div class="form-section reveal">
      <!-- 
        INTEGRAÇÃO COM FORMSPREE:
      -->
      <form action="https://formspree.io/f/mkolbjyq" method="POST" id="form-contato">
        <div class="row g-3">
          <!-- Nome -->
          <div class="col-12">
            <label class="form-label">Nome Completo</label>
            <input type="text" name="nome" id="inp-nome" class="form-control" placeholder="Digite seu nome..." required/>
          </div>
          
          <!-- E-mail -->
          <div class="col-12">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" id="inp-email" class="form-control" placeholder="exemplo@email.com" required/>
          </div>
          
          <!-- Mensagem -->
          <div class="col-12">
            <label class="form-label">Mensagem</label>
            <textarea name="mensagem" id="inp-mensagem" class="form-control" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
          </div>
          
          <!-- Botão Enviar -->
          <div class="col-12">
            <button type="submit" class="btn-add" id="btn-enviar">＋ Enviar Mensagem</button>
          </div>
        </div>
      </form>
      <div id="status-msg" style="margin-top: 1rem; text-align: center; display: none;"></div>
    </div>

  </div>

<footer>
  <div class="footer-brand"><img src="IMG/nome-bts.png" width="60px" alt=""><img src="IMG/logo-bts.png" width="30px"></div>
  <p style="font-size:clamp(0.6rem,1.2vw,0.72rem);color:var(--muted);letter-spacing:.18em;text-transform:uppercase">Bangtan Boys · 방탄소년단</p>

  <p class="footer-note">Página de fã • Não afiliada à HYBE ou Big Hit Music</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="JS/script.js"></script>

</body>
</html>
